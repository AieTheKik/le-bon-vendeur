<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;height:50px;overflow:hidden}
.banner{width:320px;height:50px;background:#F56B2A;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;text-decoration:none}
.banner-left{display:flex;align-items:center;gap:8px}
.logo{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.logo svg{width:20px;height:20px}
.banner-text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.cta{background:#fff;color:#F56B2A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:800;padding:6px 12px;border-radius:4px;border:none;white-space:nowrap;cursor:pointer;text-decoration:none}
.cta:active{opacity:0.85}
</style>
</head>
<body>
<a href="https://le-bon-vendeur.com/" class="banner" target="_blank" rel="noopener">
  <div class="banner-left">
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="rgba(255,255,255,0.2)"/><text x="3" y="15" font-size="12" font-weight="800" fill="#fff" font-family="-apple-system,sans-serif">LV</text></svg>
    </div>
    <span class="banner-text">Vendez mieux sur Le Bon Coin</span>
  </div>
  <span class="cta">Essayer →</span>
</a>
</body>
</html>
