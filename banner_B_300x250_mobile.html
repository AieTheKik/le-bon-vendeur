<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;height:250px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.banner{width:300px;height:250px;background:#fff;border:1px solid #e8e6e0;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;cursor:pointer;text-decoration:none;color:inherit}
.banner-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 18px 14px;text-align:center}
.logo{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:14px;letter-spacing:-0.3px}
.logo span{color:#F56B2A}
.title{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-1px;line-height:1.15;margin-bottom:10px}
.title span{color:#F56B2A}
.subtitle{font-size:13px;color:#777;line-height:1.5;margin-bottom:6px}
.price{font-size:12px;color:#bbb;font-weight:500}
.price strong{color:#888;font-weight:600}
.cta{display:flex;align-items:center;justify-content:center;width:100%;height:48px;background:#F56B2A;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;text-decoration:none;border-radius:0 0 11px 11px}
.cta:active{opacity:0.85}
</style>
</head>
<body>
<a href="https://le-bon-vendeur.com/" class="banner" target="_blank" rel="noopener">
  <div class="banner-body">
    <div class="logo">Le <span>Bon</span> Vendeur</div>
    <div class="title">La bonne annonce.<br><span>Le bon prix.</span> Vendu.</div>
    <div class="subtitle">Annonce + prix + conseils en quelques secondes</div>
    <div class="price">9,99€/mois · <strong>Sans engagement</strong></div>
  </div>
  <div class="cta">Analyser mon objet →</div>
</a>
</body>
</html>
